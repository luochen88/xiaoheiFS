version: '3.8'

services:
  xiaohei-debian:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: xiaohei-app-debian
    ports:
      - "8080:8080"
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
